<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=3.0, minimum-scale=1.0, user-scalable=yes" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        window.GENERALS_BASE_URL = {{ base_url|tojson }};
        function withBaseUrl(path) {
            if (path.charAt(0) != '/') path = '/' + path;
            return (window.GENERALS_BASE_URL || '') + path || '/';
        }
    </script>
    <link rel="stylesheet" href="{{ base_url }}/main.css?v=36">
    <title>generals</title>
</head>

<body>
    <div id="menu" class="center center-tag">
        <h1 class="main-title"><span class="title-accent title-accent-g">g</span>eneral<span class="title-accent title-accent-s">s</span>.<span class="title-accent title-accent-h">h</span></h1>
        <div style="margin-bottom:15px;"><input type="text" id="username-input" placeholder="Room ID" value=""></div>
        <button id="enter-room">Enter room</button><br>
        <button id="replays" class="small">Replays</button>
    </div>
    <script>
        $('#enter-room').on('click', function () {
            location.href = withBaseUrl('/games/' + $('#username-input').val());
        });
        $('#replays').on('click', function () {
            location.href = withBaseUrl('/replays');
        });
    </script>
</body>

</html>
